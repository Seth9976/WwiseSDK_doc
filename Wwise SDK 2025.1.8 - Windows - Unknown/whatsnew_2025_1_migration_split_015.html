<h1 class="calibre19" id="calibre_pb_14"><a class="pcalibre1 anchor" id="masterbus_rename"></a>
Master Audio Bus renamed to Main Audio Bus</h1>
<p class="calibre7">When creating a new project, the "Master Audio Bus" object is now named "Main Audio Bus". Update WAAPI and WAQL scripts to "Main Audio Bus" for new projects; use "Master Audio Bus" for existing ones.</p>
