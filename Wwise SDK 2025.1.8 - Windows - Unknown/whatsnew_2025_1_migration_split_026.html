<h1 class="calibre19" id="calibre_pb_25"><a class="pcalibre1 anchor" id="windows_debug_symbols"></a>
Windows Static Library Changes</h1>
<p class="calibre7">Debug symbols are now embedded directly in <code class="calibre14">.lib</code> files for the Windows platform. Wwise static libraries for Windows are no longer accompanied by the corresponding <code class="calibre14">.pdb</code> files because they are unnecessary. </p>
