<h1 class="calibre19" id="calibre_pb_3"><a class="pcalibre1 anchor" id="wwisecli_callfromwrapperapp"></a>
Wwise.exe "-CallFromWrapperApp" Argument Removed</h1>
<p class="calibre7">It was previously possible to pass the "-CallFromWrapperApp" argument to <code class="calibre14">Wwise.exe</code> to enable command line commands. This argument has been removed: all command line functionality has been moved to <code class="calibre14">WwiseCLI.exe</code>. </p>
