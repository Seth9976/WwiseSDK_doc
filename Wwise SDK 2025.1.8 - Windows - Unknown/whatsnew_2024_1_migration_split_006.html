<h1 class="calibre19" id="calibre_pb_5"><a class="pcalibre1 anchor" id="waapi_views"></a>
WAAPI Screen Capture Changes</h1>
<p class="calibre7">In WAAPI, the <code class="calibre14">ak.wwise.ui.captureScreen</code> function previously used the display name (title) as an argument to identify a view. Now, it uses its unique ID name. See <a class="pcalibre el" href="globalviewsids.html">Wwise Authoring View Identifiers</a> for a list of all available view names.</p>
