<h2 class="calibre21" id="calibre_pb_14"><a class="pcalibre1 anchor" id="memmgr_debugging"></a>
Memory Manager Debugging</h2>
<ul class="calibre8">
<li class="calibre9">AkMemDebugCheckForOverwrite has been removed in favor of <a class="pcalibre el" href="struct_ak_mem_settings_ae97967db68ec10e8410af9f776f89e0d_split_000.html#ae97967db68ec10e8410af9f776f89e0d" title="Default 0 disabled. 1 debug enabled. 2 stomp allocator enabled. 3 stomp allocator and debug enabled....">AkMemSettings::uMemoryDebugLevel</a>, which can now be used to check for overwrite and memory stomps.</li>
<li class="calibre9">New memory functions are available for debugging: AkCrtAllocator* and AkStompAllocator*</li>
</ul>
