<h2 class="calibre21" id="calibre_pb_4"><a class="pcalibre1 anchor" id="features_19_1_sound_paths_through_rooms"></a>
Sound paths through rooms and portals are now harmonized with geometric diffraction paths</h2>
<p class="calibre7">In the case where an emitter is not in the same room as the listener, the sound paths are calculated as a combination of paths generated by geometric diffraction (edge diffraction) and portal diffraction. </p><div class="calibre2">
