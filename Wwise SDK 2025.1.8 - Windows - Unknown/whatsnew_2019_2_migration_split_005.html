<h1 class="calibre19" id="calibre_pb_4"><a class="pcalibre1 anchor" id="plugininfo_json_format"></a>
PluginInfo.json format</h1>
<p class="calibre7">PluginInfo.json metadata file for soundbanks is now formatted differently. In fact, "Plugins" is now an array of maps instead of a map of maps with duplicate keys. Some JSON readers weren't able to properly parse the data in its previous format.</p>
