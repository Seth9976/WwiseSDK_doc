<h1 class="calibre19" id="calibre_pb_12"><a class="pcalibre1 anchor" id="Discontinued"></a>
Support for XAudio2 and DirectSound</h1>
<p class="calibre7"><a class="pcalibre el" href="namespace_microsoft_split_000.html">Microsoft</a> platforms now only support WASAPI. Support for XAudio2 and DirectSound has been discontinued for 2021.1.</p>
<p class="calibre7">AkAudioAPIWindows has been removed. AkPlatformInitSettings::eAudioAPI has been removed for Windows.</p>
