<h1 class="calibre19" id="calibre_pb_4"><a class="pcalibre1 anchor" id="setup_motion"></a>
Setting Up Motion</h1>
<p class="calibre7">To use motion in your application, you need to properly set up each component. All the concepts applicable to the audio workflow are also applicable to motion. It uses the same busses, Listeners, and Emitters (see <a class="pcalibre el" href="soundengine_listeners_split_000.html">Integrating Listeners</a>).</p>
