<h1 class="calibre19" id="calibre_pb_22"><a class="pcalibre1 anchor" id="waapi_audio_import"></a>
Errors and warning during audio file import</h1>
<p class="calibre7">When using <a class="pcalibre el" href="ak_wwise_core_audio_import_split_000.html">ak.wwise.core.audio.import</a>, it no longer reports an error through WAAPI when a warning or an error is found in the import log. The import log is now being returned by the call and should be parsed to detect import errors and warnings. </p>
