<h1 class="calibre19" id="calibre_pb_3"><a class="pcalibre1 anchor" id="soundengine_banks_loading_sync_vs_async"></a>
Synchronous Versus Asynchronous Loading</h1>
<p class="calibre7">Bank loading is performed in a separate thread of the sound engine. All <a class="pcalibre el" href="namespace_a_k_1_1_sound_engine_a95f8f6841a618ec3d5e51a30a1614e13_split_000.html#a95f8f6841a618ec3d5e51a30a1614e13">LoadBank()</a>, <a class="pcalibre el" href="namespace_a_k_1_1_sound_engine_a2e6ebb779470b43d78984c27f6a0c238_split_000.html#a2e6ebb779470b43d78984c27f6a0c238">PrepareEvent()</a> and <a class="pcalibre el" href="namespace_a_k_1_1_sound_engine_a76c611710ef7ffdd2d59f34e35b67cdc_split_000.html#a76c611710ef7ffdd2d59f34e35b67cdc">PrepareGameSyncs()</a> functions of the main API are available through synchronous and asynchronous loading schemes.</p>
