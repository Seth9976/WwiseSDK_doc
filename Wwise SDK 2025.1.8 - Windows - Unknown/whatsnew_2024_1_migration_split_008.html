<h1 class="calibre19" id="calibre_pb_7"><a class="pcalibre1 anchor" id="setspeakerangle_default_height"></a>
AK::SoundEngine::SetSpeakerAngles API change</h1>
<p class="calibre7">The in_fHeightAngle parameter, defining the angle of the height layer, now defaults to 30 degrees. It is now forbidden to pass 0 for this value, even if the current speaker configuration has no height channel.</p>
