<h1 class="calibre19" id="calibre_pb_1"><a class="pcalibre1 anchor" id="behavior_changes_2019_1_9"></a>
Behavior Changes</h1>
<ul class="calibre8">
<li class="calibre9"><b class="calibre13">WG-48499</b> PulseAudio (Linux/Stadia): Now support choosing between <code class="calibre14">PA_SAMPLE_FLOAT32LE</code> and <code class="calibre14">PA_SAMPLE_S16LE</code> with <code class="calibre14">AkPlatformInitSettings::sampleType</code>. <code class="calibre14">PA_SAMPLE_S16LE</code> is used by default on Stadia. Removed usage of <code class="calibre14">PA_STREAM_INTERPOLATE_TIMING</code> and <code class="calibre14">PA_STREAM_ADJUST_LATENCY</code>.</li>
</ul>
