<h2 class="calibre21" id="calibre_pb_13"><a class="pcalibre1 anchor" id="whatsnew_2017_2_auto_soundbank_mgmt"></a>
Automatic SoundBank Management</h2>
<p class="calibre7">A manual copy of SoundBanks in the <em class="calibre11">StreamingAssets</em> folder is no longer required. There is a pre-build processing step now that generates and copies SoundBanks to their appropriate location for the Unity build pipeline.</p>
