<h1 class="calibre19" id="calibre_pb_19"><a class="pcalibre1 anchor" id="spatialaudio_estimate_hfdamping"></a>
HF Damping Return Value Range Update</h1>
<p class="calibre7">The range of the HF Damping value returned by <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_1_1_spatial_audio_1_1_reverb_estimation_a2be1de76cd8b9ddf95217f06b02ebad6_split_000.html#a2be1de76cd8b9ddf95217f06b02ebad6">AK::SpatialAudio::ReverbEstimation::EstimateHFDamping()</a></code> has been doubled and is now -1 to 1. RTPCs mapped to this value now range from -1 to 1.</p>
