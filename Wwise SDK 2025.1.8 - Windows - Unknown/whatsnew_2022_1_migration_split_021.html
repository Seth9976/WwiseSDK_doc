<h1 class="calibre19" id="calibre_pb_20"><a class="pcalibre1 anchor" id="removal_aac"></a>
Removal of the AAC Codec</h1>
<p class="calibre7">Support for the AAC codec has been removed from Wwise. Existing Wwise projects using the AAC format in their Conversion Settings will be automatically modified to use Vorbis instead. Old media assets must be reconverted to a compatible software codec to function.</p>
