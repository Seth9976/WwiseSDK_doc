<h1 class="calibre19" id="calibre_pb_4"><a class="pcalibre1 anchor" id="wwiseplugin_dialog_guide_getdialog"></a>

<p class="calibre7">Refer to <a class="pcalibre el" href="plugin_frontend_windows_split_003.html#wwiseplugin_dialogcode">Dialog Acquisition</a> for information about <a class="pcalibre el" href="class_a_k_1_1_wwise_1_1_plugin_1_1_v1_1_1_g_u_i_windows_a400dc71bed3f216d4c5afe2297474de1_split_000.html#a400dc71bed3f216d4c5afe2297474de1" title="Retrieves the plug-in's HINSTANCE used for loading resources.">AK::Wwise::Plugin::GUIWindows::GetResourceHandle()</a> and <a class="pcalibre el" href="class_a_k_1_1_wwise_1_1_plugin_1_1_v1_1_1_g_u_i_windows_a21b81136769b185c244ada93e6767f14_split_000.html#a21b81136769b185c244ada93e6767f14" title="Retrieves the plug-in dialog parameters.">AK::Wwise::Plugin::GUIWindows::GetDialog()</a> which are functions you must implement for Wwise to find your dialog resources.</p>
