<h2 class="calibre21" id="calibre_pb_9"><a class="pcalibre1 anchor" id="features_19_2_sound_transmission_model"></a>
Sound Transmission Model</h2>
<p class="calibre7">Sound can go through walls. Rooms or geometry (per-triangle) now expose an occlusion factor which filters the direct path from the emitter to the listener. Additionally, the wet path now diffracts around geometry edges.</p>
