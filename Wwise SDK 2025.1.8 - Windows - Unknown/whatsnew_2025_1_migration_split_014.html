<h1 class="calibre19" id="calibre_pb_13"><a class="pcalibre1 anchor" id="actormixer_rename"></a>
Actor-Mixer renamed to Property Container</h1>
<p class="calibre7">The Actor-Mixer object is now called a Property Container.</p>
<p class="calibre7">Usage of "Actor-Mixer" and "ActorMixer" in WAAPI, WAQL and in Tab Delimited Import files should be changed to "Property Container" and "PropertyContainer" respectively.</p>
