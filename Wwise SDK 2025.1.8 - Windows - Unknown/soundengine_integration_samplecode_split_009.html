<h2 class="calibre21" id="calibre_pb_8"><a class="pcalibre1 anchor" id="integrationdemo_demos_markers"></a>
Subtitles/Markers</h2>
<p class="calibre7">This demo shows how you can set up a callback function to receive notification when markers inside a sound file are hit. For this demonstration, we are using the markers to synchronize subtitles with the audio track.</p>
<p class="calibre7">For more information on markers, see <a class="pcalibre el" href="soundengine_markers_split_000.html">Integrating Markers</a>.</p>
