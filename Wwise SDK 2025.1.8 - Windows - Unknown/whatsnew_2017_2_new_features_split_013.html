<h2 class="calibre21" id="calibre_pb_12"><a class="pcalibre1 anchor" id="whatsnew_2017_2_timeline_audioscrub"></a>
Timeline &amp; Audio Scrubbing</h2>
<p class="calibre7">It’s now possible to play back from anywhere in the timeline to allow, for example, more control when editing in-game cinematics. Audio scrubbing is also supported, which can be helpful when syncing audio to video.</p>
