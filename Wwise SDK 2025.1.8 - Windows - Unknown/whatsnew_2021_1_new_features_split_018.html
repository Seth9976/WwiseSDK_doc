<h2 class="calibre21" id="calibre_pb_17"><a class="pcalibre1 anchor" id="features_21_1_waapi_in_unity"></a>
WAAPI in Unity</h2>
<p class="calibre7">The WAAPI client in Unity has been completely rewritten using a native C# client, making it easier to use. The Wwise Picker window also uses WAAPI, if available, to populate its various lists. WAAPI also enables additional functionality in the Wwise Picker Window.</p>
