<h1 class="calibre19" id="calibre_pb_2"><a class="pcalibre1 anchor" id="soundframe_not_included"></a>
Removal of SoundFrame API</h1>
<p class="calibre7">The SoundFrame API is no longer included in Wwise. Wwise 2021.1 was the last major version to support the SoundFrame API. Refer to <a class="pcalibre el" href="waapi_split_000.html">Using the Wwise Authoring API (WAAPI)</a> to learn more about the Wwise Authoring API (WAAPI), the latest SoundFrame technology.</p>
