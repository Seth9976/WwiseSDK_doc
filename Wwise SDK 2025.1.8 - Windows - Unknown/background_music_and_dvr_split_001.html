<h1 class="calibre19" id="calibre_pb_0"><a class="pcalibre1 anchor" id="bgm_and_dvr_Android"></a>
BGM details for Android</h1>
<p class="calibre7">Make sure to fill the jActivity member of the <a class="pcalibre el" href="struct_ak_platform_init_settings_split_000.html">AkPlatformInitSettings</a>. The Mute/Unmute action will occur only when the user switches from the music player app to the game. This means that there is no "Unmute" if the user music finishes by itself.</p>
