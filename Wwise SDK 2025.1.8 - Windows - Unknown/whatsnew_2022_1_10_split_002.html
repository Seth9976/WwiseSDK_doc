<li class="calibre9"><b class="calibre13">WG-69641</b> Adjusted the default setting for <code class="calibre14"><a class="pcalibre el" href="struct_ak_job_mgr_settings_ab2a8def39da063c40396d44186a67bf8_split_000.html#ab2a8def39da063c40396d44186a67bf8" title="Size of each memory slab used for job manager memory. Must be a power of two. Default is 8K.">AkJobMgrSettings.uMemorySlabSize</a></code> from 8KiB to 4KiB to prevent instability due to some memory systems not guaranteeing alignment greater than 4KiB.</li>
</ul>
