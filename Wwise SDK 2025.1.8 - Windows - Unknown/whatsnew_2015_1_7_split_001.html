<h1 class="calibre19" id="calibre_pb_0"><a class="pcalibre1 anchor" id="behavior_changes_2015_1_7"></a>
Behavior changes</h1>
<p class="calibre7"><b class="calibre13">iOS</b> It is now unnecessary to call <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_1_1_sound_engine_afc66d31bf5c6425d841ca3510e2d0539_split_000.html#afc66d31bf5c6425d841ca3510e2d0539">Suspend()</a></code> and <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_1_1_sound_engine_a9244da1d4d0deedcabdaaae863fcff47_split_000.html#a9244da1d4d0deedcabdaaae863fcff47">WakeupFromSuspend()</a></code> for iOS for normal application interruptions (background/foreground, music, and so on). The management of the application life cycle is monitored internally and these calls are handled by the sound engine.</p>
