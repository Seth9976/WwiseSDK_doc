<h1 class="calibre19" id="calibre_pb_0"><a class="pcalibre1 anchor" id="api_2016_1_1"></a>
API changes</h1>
<p class="calibre7">On Windows, the calls <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_a84b3896b7b5b223c72b5ea826fae6bd8_split_000.html#a84b3896b7b5b223c72b5ea826fae6bd8">AK::GetDeviceID</a></code>, <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_a8609f19bc85d9ea8266c2fdd79ac5084_split_000.html#a8609f19bc85d9ea8266c2fdd79ac5084">AK::GetDeviceIDFromName</a></code>, and <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_a5ce827d21b248fbf326b46c75d080c21_split_000.html#a5ce827d21b248fbf326b46c75d080c21">AK::GetWindowsDeviceName</a></code> must be called after <code class="calibre14">CoInitialize</code> (<a class="pcalibre el" href="namespace_microsoft_split_000.html">Microsoft</a>'s COM API) has been called for the calling thread.</p>
