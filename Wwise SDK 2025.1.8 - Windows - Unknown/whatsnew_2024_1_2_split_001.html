<h1 class="calibre19" id="calibre_pb_0"><a class="pcalibre1 anchor" id="generic_behavior_changes_2024_1_2"></a>
Behavior Changes</h1>
<ul class="calibre8">
<li class="calibre9"><b class="calibre13">WG-63760</b> Plug-ins in Wwise Authoring that call the <code class="calibre14">GetValue</code> functions on <code class="calibre14"><a class="pcalibre el" href="namespace_a_k_1_1_wwise_1_1_plugin_a052a63312bad5bdbd0adc1b07decf6de_split_000.html#a052a63312bad5bdbd0adc1b07decf6de" title="Latest version of the C++ PropertySet interface.">AK::Wwise::Plugin::PropertySet</a></code> with invalid parameter names now return zero-initialized values instead of garbage data. This eliminates a potential source of non-determinism in SoundBank generation.</li>
</ul>
