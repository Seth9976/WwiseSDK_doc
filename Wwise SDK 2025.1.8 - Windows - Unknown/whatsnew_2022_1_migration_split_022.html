<h1 class="calibre19" id="calibre_pb_21"><a class="pcalibre1 anchor" id="akarray_trivial_copy"></a>
AkArray Move Policy</h1>
<p class="calibre7"><code class="calibre14"><a class="pcalibre el" href="class_ak_array_a1bf66764d17c04dacf18952acf22af0f_split_000.html#a1bf66764d17c04dacf18952acf22af0f">AkArray::Insert</a></code> and <code class="calibre14"><a class="pcalibre el" href="class_ak_array_a83b57b37e09eddbe82c3bf75c32ef6c7_split_000.html#a83b57b37e09eddbe82c3bf75c32ef6c7" title="Erase the specified iterator from the array.">AkArray::Erase</a></code> now use memmove when <code class="calibre14">TMovePolicy::IsTrivial()</code> is true. That is, both functions now assume that a trivial move policy means that items are trivially relocatable. This assumption was already made in the case of <code class="calibre14"><a class="pcalibre el" href="class_ak_array_a12d3d7f19cbe16983ceba659b6ec6474_split_000.html#a12d3d7f19cbe16983ceba659b6ec6474">AkArray::GrowArray</a></code>.</p>
