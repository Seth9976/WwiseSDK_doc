<h2 class="calibre21" id="calibre_pb_4"><a class="pcalibre1 anchor" id="waapi_migration_error"></a>
WAAPI ak.wwise.core.audio.importTabDelimited error format changed</h2>
<p class="calibre7">The <code class="calibre14">details</code> field in the error object returned by <a class="pcalibre el" href="ak_wwise_core_audio_importtabdelimited_split_000.html">ak.wwise.core.audio.importTabDelimited</a> is now compliant with WAMP specifications. It changed from an array to an object. The array was moved to a field called <code class="calibre14">results</code> in the object.</p>
