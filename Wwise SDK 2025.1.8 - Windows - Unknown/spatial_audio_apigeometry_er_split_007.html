<h2 class="calibre21" id="calibre_pb_6"><a class="pcalibre1 anchor" id="spatial_audio_wwiseprojectsetup_usingacoustictextures"></a>
Using Acoustic Textures</h2>
<p class="calibre7">For each reflecting triangle, the game passes the ID of a material. These materials are edited in the Wwise Project in the form of Acoustic Textures, in the Virtual Acoustics ShareSets. This is where you may define the absorption characteristics of each material.</p>
