<h2 class="calibre21" id="calibre_pb_13"><a class="pcalibre1 anchor" id="removed_clamping_triggerrate"></a>
Removed clamping of trigger rate</h2>
<p class="calibre7">Prior to Wwise 2017.1, the sound engine was arbitrarily clamping the trigger rate transition time of Random and Sequence Containers to never be less than 22 ms. We removed this limitation to enable creative content.</p>
