<h1 class="calibre19" id="calibre_pb_6"><a class="pcalibre1 anchor" id="defining_custom_commands_with_waapi"></a>
Using Add-on Commands in Conjunction with WAAPI</h1>
<p class="calibre7">Add-on commands can be used to execute WAAPI scripts or programs. This gives you access to Wwise functionalities and project data. Refer to <a class="pcalibre el" href="waapi_split_000.html">Using the Wwise Authoring API (WAAPI)</a> to learn what you can do with WAAPI.</p>
