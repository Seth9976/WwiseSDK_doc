<h1 class="calibre19" id="calibre_pb_1"><a class="pcalibre1 anchor" id="raytracing_geometry_guide_concepts"></a>
Concepts</h1>
<ul class="calibre8">
<li class="calibre9">Primary rays: the rays directly cast from the listener</li>
<li class="calibre9">Reflection: bouncing of sound on surfaces</li>
<li class="calibre9">Diffraction: bending of sound around objects</li>
<li class="calibre9">Paths: series of reflections/diffractions from the listener to an emitter</li>
</ul>
