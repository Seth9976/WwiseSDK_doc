<h2 class="calibre21" id="calibre_pb_9"><a class="pcalibre1 anchor" id="wwiseplugin_xml_plugininfo_tag_metadataPlugin"></a>
Metadata PluginInfo Element</h2>
<p class="calibre7">For a metadata plug-in, it is important to set the MenuPath="Metadata" attribute to the PluginInfo node as such:</p>
<div class="fragment"><div class="line">&lt;<a class="pcalibre code" href="namespace_a_k_1_1_wwise_1_1_plugin_a69141ebf4159597c1e76aad07862c823_split_000.html#a69141ebf4159597c1e76aad07862c823">PluginInfo</a> MenuPath=<span class="stringliteral">"Metadata"</span>&gt;</div>
<div class="line">    &lt;PlatformSupport&gt;</div>
<div class="line">        &lt;Platform Name=<span class="stringliteral">"Any"</span>&gt;&lt;/Platform&gt;</div>
<div class="line">    &lt;/PlatformSupport&gt;</div>
<div class="line">&lt;/<a class="pcalibre code" href="namespace_a_k_1_1_wwise_1_1_plugin_a69141ebf4159597c1e76aad07862c823_split_000.html#a69141ebf4159597c1e76aad07862c823">PluginInfo</a>&gt;</div>
</div><!-- fragment --></div></div></div></body></html>
