<h1 class="calibre19" id="calibre_pb_0"><a class="pcalibre1 anchor" id="sdk_changes_2019_2"></a>
Platform SDK Changes</h1>
<ul class="calibre8">
<li class="calibre9">(PS4, Windows, UWP) These platforms now support SDK builds for Visual Studio 2019.</li>
<li class="calibre9">Authoring requires Windows 7 SP1 and up. Changed the Wwise Authoring tool, including all plug-ins, to be compiled using Visual Studio 2019, with Windows SDK target version 10.0.17763.0.</li>
</ul>
