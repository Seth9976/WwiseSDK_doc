<h1 class="calibre19" id="calibre_pb_7"><a class="pcalibre1 anchor" id="migrating_old_projects_to_2021_1"></a>
Migrating from a Wwise Version Earlier Than 2013.1</h1>
<p class="calibre7">Support has been removed for the migration of Wwise projects from versions earlier than 2013.1. It remains possible to migrate such projects to 2021.1 by first migrating to 2019.2.</p>
