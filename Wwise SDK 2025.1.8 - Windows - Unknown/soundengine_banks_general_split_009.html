<h1 class="calibre19" id="calibre_pb_8"><a class="pcalibre1 anchor" id="soundengine_banks_general_identification"></a>
Identifying Banks</h1>
<p class="calibre7">Like all other Wwise objects in the game, banks are identified by IDs that are generated by hashing their name. Loading and unloading banks always involves access to an I/O device at some point.</p>
